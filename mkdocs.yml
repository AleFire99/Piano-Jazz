          - Chords: practice/beginner/Beginner chords/Beginner chords exercises.md
          - Scales: practice/beginner/Beginner scales/Beginner scales exercises.md
          - Voicings: practice/beginner/Beginner voicings/Beginner voicings exercises.md
          - Lead Sheets: practice/beginner/Beginner lead sheets/Beginner lead sheets exercises.md
          - Improvisation: practice/beginner/Beginner improvisation/Beginner improvisation exercises.md
      - Intermediate:
